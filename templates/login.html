{% extends "base.html" %}
{% block title %}Entrar — BookHub{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-visual__bg"></div>
    <div class="auth-visual__content">
      <div class="auth-quote">
        <blockquote>"Um leitor vive mil vidas antes de morrer."</blockquote>
        <cite>— George R.R. Martin</cite>
      </div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-wrap">
      <a href="{{ url_for('home') }}" class="auth-logo">
        Book<span class="logo-accent">Hub</span>
      </a>
      <h1 class="auth-title">Bem-vindo de volta</h1>
      <p class="auth-subtitle">Acesse sua estante digital</p>

      <form method="POST" action="{{ url_for('login') }}" class="form" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <div class="input-password">
            <input type="password" id="senha" name="senha" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-password" data-target="senha">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-check">
          <input type="checkbox" id="lembrar" name="lembrar" />
          <label for="lembrar">Lembrar de mim</label>
        </div>

        <button type="submit" class="btn btn--primary btn--full">Entrar</button>
      </form>

      <p class="auth-switch">
        Não tem conta?
        <a href="{{ url_for('cadastro') }}">Cadastre-se grátis</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
